<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>移花宮 古法頭湯舒養｜選擇預約門市</title>
<meta name="description" content="移花宮古法頭湯舒養 — 請選擇門市，進入專屬預約頁面。">
<link rel="icon" href="yihua-logo.png">

<!-- ============================================================
     本頁門市卡片為「動態」內容，資料來自 /api/stores（Netlify Function
     + Netlify Blobs）。日後在 /admin 後台新增的門市會自動出現在這裡，
     狀態為「籌備中」的門市會顯示灰階徽章、按鈕不可點擊。
     ============================================================ -->

<style>
  :root{
    --ink-blue-deep: #0B1F33;
    --wood-deep: #4A3324;
    --wood-darker: #2E2015;
    --mist-gold: #C8A96A;
    --mist-gold-text: #9C7A42;
    --mist-gold-light: #E8D7B0;
    --cream: #F8F1E7;
    --stone: #EFE6D6;
    --card-bg: #FBF6ED;
    --text-dark: #3B2A1E;
    --text-muted: #6B5847;
    --soon-grey: #cfc6b8;
    --soon-grey-text: #8a7a63;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ width:100%; overflow-x:hidden; }

  body{
    font-family: "Noto Serif TC", "Noto Sans TC", "PMingLiU", "Songti TC", -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, var(--cream) 0%, var(--stone) 45%, var(--cream) 100%);
    color: var(--text-dark);
    min-height: 100vh;
    position: relative;
  }

  .bg-decor{ position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-decor::before{
    content:""; position:absolute; top:-10%; left:-15%; width:70%; height:60%;
    background: radial-gradient(circle at center, rgba(200,169,106,0.16) 0%, rgba(200,169,106,0) 70%);
    filter: blur(20px);
  }
  .bg-decor::after{
    content:""; position:absolute; bottom:-15%; right:-10%; width:65%; height:55%;
    background: radial-gradient(circle at center, rgba(74,51,36,0.10) 0%, rgba(74,51,36,0) 70%);
    filter: blur(20px);
  }
  .lattice{
    position:absolute; inset:0; opacity:0.05;
    background-image:
      repeating-linear-gradient(0deg, var(--wood-deep) 0px, var(--wood-deep) 1px, transparent 1px, transparent 64px),
      repeating-linear-gradient(90deg, var(--wood-deep) 0px, var(--wood-deep) 1px, transparent 1px, transparent 64px);
  }
  .mist-blossom{ position:absolute; width:340px; height:340px; opacity:0.08; top:8%; right:4%; }
  .mist-blossom.two{ top:auto; bottom:6%; left:2%; right:auto; width:260px; height:260px; opacity:0.06; }

  .content-wrap{
    position:relative; z-index:1; max-width: 1180px; margin: 0 auto; padding: 0 24px;
    min-height:100vh; display:flex; flex-direction:column;
  }

  header{ text-align:center; padding: 32px 0 12px; }
  .brand-logo{ width: 92px; height: auto; margin: 0 auto 12px; display: block; }
  .brand-name{ font-size: 26px; letter-spacing: 4px; color: var(--ink-blue-deep); font-weight: 600; }
  .brand-en{ margin-top: 8px; font-size: 12px; letter-spacing: 3px; color: var(--mist-gold-text); text-transform: uppercase; }
  .brand-slogan{ margin-top: 16px; font-size: 14pt; color: var(--text-muted); letter-spacing: 1px; line-height: 1.9; }
  .header-divider{ width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--mist-gold), transparent); margin: 20px auto 0; }

  .hero{ text-align:center; padding: 44px 0 8px; }
  .hero h1{ font-size: 34px; color: var(--ink-blue-deep); letter-spacing: 3px; font-weight: 600; display:inline-block; }
  .hero-sub{ margin-top: 14px; font-size: 14pt; color: var(--mist-gold-text); letter-spacing: 1px; }
  .hero-desc{ margin: 18px auto 0; max-width: 560px; font-size: 14pt; line-height: 2; color: var(--text-muted); opacity: 0.95; }

  .stores{ flex:1; display:flex; align-items:center; justify-content:center; padding: 44px 0 20px; }
  .store-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 32px;
    width:100%;
    max-width: 980px;
    margin: 0 auto;
  }

  .store-loading, .store-error{
    grid-column: 1 / -1;
    text-align:center;
    font-size: 14pt;
    color: var(--text-muted);
    padding: 20px 0;
  }

  .store-card{
    background: linear-gradient(160deg, var(--card-bg), #F3EADB);
    border: 1px solid rgba(200,169,106,0.5);
    border-radius: 20px;
    padding: 40px 32px 32px;
    text-align:center;
    color: var(--ink-blue-deep);
    cursor:pointer;
    position: relative;
    transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    box-shadow: 0 8px 30px rgba(74,51,36,0.14);
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
  }

  .store-card:hover, .store-card:focus-within{
    transform: translateY(-8px);
    border-color: var(--mist-gold);
    box-shadow: 0 18px 45px rgba(200,169,106,0.35), 0 0 0 1px rgba(200,169,106,0.4);
  }

  .store-card--soon{ cursor:default; opacity: 0.82; }
  .store-card--soon:hover, .store-card--soon:focus-within{
    transform: none;
    border-color: rgba(200,169,106,0.5);
    box-shadow: 0 8px 30px rgba(74,51,36,0.14);
  }

  .soon-badge{
    position:absolute;
    top:16px; right:16px;
    background: var(--wood-deep);
    color: var(--mist-gold-light);
    font-size: 10.5pt;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 999px;
  }

  .card-mark{ width: 34px; height: 34px; margin-bottom: 18px; opacity: 0.8; }
  .store-card h2{ font-size: 22px; letter-spacing: 2px; color: var(--ink-blue-deep); font-weight: 600; }
  .store-sub{ margin-top: 8px; font-size: 14pt; color: var(--text-dark); letter-spacing: 1px; font-weight: 500; }
  .store-line{ width: 34px; height: 1px; background: var(--mist-gold); margin: 18px auto; opacity: 0.7; }
  .store-desc{ font-size: 14pt; line-height: 1.9; color: var(--text-muted); max-width: 320px; }

  .store-btn{
    margin-top: 26px;
    display:inline-block;
    width: 100%;
    max-width: 280px;
    padding: 15px 20px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--ink-blue-deep), var(--wood-deep));
    color: var(--mist-gold-light);
    font-size: 14pt;
    letter-spacing: 2px;
    text-decoration:none;
    border: 1px solid rgba(200,169,106,0.6);
    transition: background 0.35s ease, color 0.35s ease, box-shadow 0.35s ease;
    min-height: 48px;
    line-height: 1.4;
  }

  .store-btn:hover, .store-btn:focus-visible{
    background: linear-gradient(135deg, var(--mist-gold), #dcc48f);
    color: var(--ink-blue-deep);
    box-shadow: 0 6px 20px rgba(200,169,106,0.45);
  }

  .store-btn--disabled{
    background: var(--soon-grey);
    color: var(--soon-grey-text);
    border-color: rgba(150,130,100,0.3);
    cursor: not-allowed;
  }
  .store-btn--disabled:hover{
    background: var(--soon-grey);
    color: var(--soon-grey-text);
    box-shadow:none;
  }

  footer{ text-align:center; padding: 28px 0 32px; font-size: 14pt; letter-spacing: 1px; color: var(--text-muted); opacity: 0.75; }

  @media (max-width: 860px){
    .content-wrap{ padding: 0 20px; }
    header{ padding: 24px 0 8px; }
    .brand-logo{ width: 68px; margin-bottom: 8px; }
    .brand-name{ font-size: 20px; letter-spacing: 3px; }
    .brand-en{ font-size: 10.5px; }
    .brand-slogan{ font-size: 14pt; padding: 0 8px; }
    .hero{ padding: 30px 0 4px; }
    .hero h1{ font-size: 26px; }
    .hero-sub{ font-size: 14pt; }
    .hero-desc{ font-size: 14pt; padding: 0 6px; }
    .stores{ padding: 30px 0 12px; }
    .store-grid{ grid-template-columns: 1fr; gap: 22px; }
    .store-card{ padding: 32px 24px 28px; }
    .store-btn{ max-width: 100%; }
    footer{ font-size: 14pt; padding: 20px 0 26px; }
  }

  @media (max-width: 400px){
    .brand-logo{ width: 60px; }
    .brand-name{ font-size: 18px; }
    .hero h1{ font-size: 23px; }
    .store-card h2{ font-size: 20px; }
  }

  @media (prefers-reduced-motion: reduce){
    .store-card, .store-btn{ transition:none; }
  }
</style>
</head>
<body>

<div class="bg-decor">
  <div class="lattice"></div>
  <svg class="mist-blossom" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#C8A96A" stroke-width="1">
      <circle cx="100" cy="60" r="30"/><circle cx="140" cy="100" r="30"/>
      <circle cx="100" cy="140" r="30"/><circle cx="60" cy="100" r="30"/><circle cx="100" cy="100" r="30"/>
    </g>
  </svg>
  <svg class="mist-blossom two" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#4A3324" stroke-width="1">
      <circle cx="100" cy="60" r="26"/><circle cx="136" cy="100" r="26"/>
      <circle cx="100" cy="140" r="26"/><circle cx="64" cy="100" r="26"/><circle cx="100" cy="100" r="26"/>
    </g>
  </svg>
</div>

<div class="content-wrap">

  <header>
    <img class="brand-logo" src="yihua-logo.png" alt="移花宮 古法頭湯舒養 Logo">
    <div class="brand-name">移花宮 古法頭湯舒養</div>
    <div class="brand-en">Yihua Palace · Ancient Head Ritual</div>
    <div class="header-divider"></div>
    <p class="brand-slogan">以漢方草本頭湯與古法手技，為忙碌的你留一方溫柔照顧的天地。</p>
  </header>

  <section class="hero">
    <h1>選擇預約門市</h1>
    <p class="hero-sub">請選擇您想預約的移花宮門市，我們將帶您進入專屬預約頁面。</p>
    <p class="hero-desc">
      每一場頭湯，都是一段讓身心慢慢鬆下來的舒養儀式。<br>
      請依照方便的地點選擇門市預約。
    </p>
  </section>

  <section class="stores">
    <div class="store-grid" id="storeGrid">
      <p class="store-loading">門市資訊載入中…</p>
    </div>
  </section>

  <footer>
    © 2026 移花宮古法頭湯舒養 · 東方漢方頭部舒養品牌
  </footer>

</div>

<script>
  function escapeHtml(str){
    return String(str == null ? "" : str).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  var markSvg = '<svg class="card-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<circle cx="20" cy="20" r="18" stroke="#C8A96A" stroke-width="1"/>'
    + '<path d="M20 8 L20 32 M8 20 L32 20" stroke="#C8A96A" stroke-width="1"/></svg>';

  function renderStores(stores){
    var grid = document.getElementById('storeGrid');

    if(!stores || stores.length === 0){
      grid.innerHTML = '<p class="store-loading">目前尚無門市資訊。</p>';
      return;
    }

    grid.innerHTML = stores.map(function(s){
      var name = escapeHtml(s.name);
      var sub = escapeHtml(s.subtitle);
      var desc = escapeHtml(s.description);

      if(s.status === 'active'){
        var link = escapeHtml(s.link);
        return '<a class="store-card" href="' + link + '" rel="noopener" aria-label="預約' + name + '">'
          + markSvg
          + '<h2>' + name + '</h2>'
          + '<div class="store-sub">' + sub + '</div>'
          + '<div class="store-line"></div>'
          + '<p class="store-desc">' + desc + '</p>'
          + '<span class="store-btn">預約' + name + '</span>'
          + '</a>';
      }

      return '<div class="store-card store-card--soon" aria-label="' + name + ' 籌備中">'
        + '<span class="soon-badge">籌備中</span>'
        + markSvg
        + '<h2>' + name + '</h2>'
        + '<div class="store-sub">' + sub + '</div>'
        + '<div class="store-line"></div>'
        + '<p class="store-desc">' + desc + '</p>'
        + '<span class="store-btn store-btn--disabled">敬請期待</span>'
        + '</div>';
    }).join('');

    var cards = grid.querySelectorAll('.store-card:not(.store-card--soon)');
    cards.forEach(function(card){
      card.addEventListener('click', function(e){
        var href = card.getAttribute('href');
        if(href && e.target === card){
          window.location.href = href;
        }
      });
    });
  }

  fetch('/api/stores')
    .then(function(res){
      if(!res.ok) throw new Error('load failed');
      return res.json();
    })
    .then(renderStores)
    .catch(function(){
      document.getElementById('storeGrid').innerHTML =
        '<p class="store-error">門市資訊載入失敗，請重新整理頁面再試一次。</p>';
    });
</script>

</body>
</html>
